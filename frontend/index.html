<!DOCTYPE html>
<html>
<head>
  <title>Video Downloader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h2 { text-align: center; color: #333; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
    button { background: #f48120; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #output { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; word-wrap: break-word; }
    .error { color: #d32f2f; }
    .success { color: #388e3c; }
    a.download-btn { display: inline-block; padding: 12px 24px; background: #4CAF50; color: white; text-decoration: none; border-radius: 8px; margin-top: 10px; }
    img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Video Downloader</h2>
  <input type="text" id="url" placeholder="YouTube/Instagram/Facebook link paste karo">
  <button id="downloadBtn" onclick="download()">Download Karo</button>
  <div id="output"></div>

  <script>
    async function download() {
      const url = document.getElementById('url').value.trim();
      const output = document.getElementById('output');
      const btn = document.getElementById('downloadBtn');
      
      if (!url) {
        output.innerHTML = '<p class="error">Pehle link daalo bhai!</p>';
        return;
      }

      output.innerHTML = "Loading... Video ki info nikaal rahe hain ⏳";
      btn.disabled = true;
      
      const backendUrl = 'https://asshumalik.pythonanywhere.com';
      
      try {
        const res = await fetch(`${backendUrl}/info?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        
        if (data.error) {
          output.innerHTML = `<p class="error">Error: ${data.error}</p>`;
        } else if (data.url) {
          output.innerHTML = `
            <p class="success">Video mil gaya! ✅</p>
            <img src="${data.thumbnail || ''}" alt="thumbnail">
            <p><strong>Title:</strong> ${data.title}</p>
            <p><strong>Duration:</strong> ${Math.floor(data.duration / 60)}:${String(data.duration % 60).padStart(2, '0')} min</p>
            <a href="${data.url}" target="_blank" class="download-btn">Download Video</a>
            <p style="font-size:12px; color:#666; margin-top:10px;">Note: Link pe right-click karke "Save as" karna</p>
          `;
        } else {
          output.innerHTML = `<p class="error">Kuch galat ho gaya</p>`;
        }
        
      } catch(err) {
        output.innerHTML = `<p class="error">Error: ${err.message}<br>Backend down ho sakta hai ya CORS issue.</p>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
