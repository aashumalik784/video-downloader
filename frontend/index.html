<!DOCTYPE html>
<html>
<head>
  <title>Video Downloader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box; }
    button { background: #f48120; color: white; border: none; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Video Downloader</h2>
  <input type="text" id="url" placeholder="Video link paste karo">
  <button onclick="download()">Download Karo</button>
  <div id="output"></div>
  <script>
    async function download() {
      const url = document.getElementById('url').value;
      const output = document.getElementById('output');
      output.innerHTML = "Loading...";
      
      // PythonAnywhere ka backend URL
      const backendUrl = 'https://asshumalik.pythonanywhere.com';
      
      try {
        // Agar tere backend me /api/info endpoint hai
        const res = await fetch(`${backendUrl}/api/info?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        
        if(data.url || data.formats) {
          // YT-DLP usually formats ki list deta hai
          output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
          output.innerHTML = "Error: " + (data.error || "Kuch galat ho gaya");
        }
      } catch(err) {
        output.innerHTML = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
