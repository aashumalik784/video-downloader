<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; word-break: break-all; }
        pre { background: #eee; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Video link paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            
            if(!url) { status.innerText = "Link daalo bhai!"; return; }
            status.innerText = "Processing...";
            resultDiv.innerHTML = "";

            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                console.log("Mera API Data:", data); 

                // Yahan API response check hoga
                const link = data.video_url || data.link || data.url || (data.result && data.result.url) || data.media;

                if (link) {
                    status.innerText = "Success!";
                    resultDiv.innerHTML = `<a href="${link}" target="_blank" style="font-size:18px;">Click Here to Download</a>`;
                } else {
                    status.innerText = "Link nahi mila! Server ka data niche dekho:";
                    resultDiv.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
                }
            } catch (err) {
                status.innerText = "Error aa gayi: " + err.message;
            }
        }
    </script>
</body>
</html>
