<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 Social Media Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .status.loading { background: #f0f0f0; color: #666; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .download-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
        }
        .debug {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
            display: none;
            overflow-x: auto;
        }
        .debug.show { display: block; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .note {
            margin-top: 20px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Social Media Downloader</h1>
        <div class="subtitle">Instagram • YouTube • Facebook • Twitter • TikTok</div>
        
        <input type="text" id="urlInput" placeholder="Paste video link here...">
        <button onclick="downloadVideo()">✨ Download Video</button>
        
        <div id="status"></div>
        <div id="result"></div>
        
        <button onclick="toggleDebug()" style="background: #6c757d; margin-top: 10px;">🐛 Debug Info</button>
        <div id="debug" class="debug"></div>
        
        <div class="note">
            💡 <strong>Note:</strong> Agar download kaam nahi kar raha, toh RapidAPI par free subscribe karein:<br>
            <a href="https://rapidapi.com/" target="_blank">rapidapi.com</a> → Search "instagram downloader" → Subscribe (Free)
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Yahan apna Render backend URL daalein
        const BACKEND_URL = "https://video-downloader-g5bz.onrender.com";
        
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value.trim();
            const statusDiv = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            const debugDiv = document.getElementById("debug");
            
            if(!url) {
                showStatus("⚠️ Please paste a video link!", "error");
                return;
            }
            
            showStatus("⏳ Processing...", "loading");
            resultDiv.innerHTML = "";
            debugDiv.innerHTML = "";
            debugDiv.classList.remove("show");
            
            try {
                const response = await fetch(`${BACKEND_URL}/download`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                console.log("Response:", data);
                
                debugDiv.innerHTML = "<strong>🔍 Full Response:</strong><pre>" + JSON.stringify(data, null, 2) + "</pre>";
                
                if (data.success && data.video_url) {
                    showStatus("✅ Video ready! Click to download", "success");
                    resultDiv.innerHTML = `
                        <a href="${data.video_url}" target="_blank" class="download-btn" download>
                            ⬇️ Download Video (${data.source || 'API'})
                        </a>
                    `;
                } 
                else if (data.video_url) {
                    showStatus("✅ Success!", "success");
                    resultDiv.innerHTML = `<a href="${data.video_url}" target="_blank" class="download-btn">⬇️ Download</a>`;
                }
                else {
                    showStatus("❌ " + (data.error || "Video link nahi mila"), "error");
                    debugDiv.classList.add("show");
                }
                
            } catch (err) {
                showStatus("❌ Network Error: " + err.message, "error");
                debugDiv.innerHTML = "<strong>Error:</strong> " + err.message + "<br><br>Check if backend is running!";
                debugDiv.classList.add("show");
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById("status");
            statusDiv.innerHTML = message;
            statusDiv.className = "status " + type;
        }
        
        function toggleDebug() {
            document.getElementById("debug").classList.toggle("show");
        }
        
        // Enter key support
        document.getElementById("urlInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") downloadVideo();
        });
    </script>
</body>
</html>
