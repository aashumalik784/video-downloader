<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Video link paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");

            if (!url) { status.innerText = "Link daalna zaroori hai!"; return; }

            status.innerText = "Processing... thoda wait karein.";
            resultDiv.innerHTML = "";
            
            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                console.log("API Data:", data);

                status.innerText = "Success! Niche click karein.";
                
                // API se jo link mil raha hai
                const videoLink = data.video_url || data.link || data.url;
                
                if (videoLink) {
                    // Force download ke liye HTML link
                    resultDiv.innerHTML = `<a href="${videoLink}" target="_blank" style="font-size: 20px; color: green;">Click here to Download</a>
                    <p style="font-size: 12px; color: gray;">(Agar download na ho, toh link par long-press karke 'Download Link' chunein)</p>`;
                } else {
                    resultDiv.innerHTML = "Video link nahi mila. Server busy ho sakta hai.";
                }
            } catch (err) {
                status.innerText = "Error aayi hai, phir se try karein.";
            }
        }
    </script>
</body>
</html>
