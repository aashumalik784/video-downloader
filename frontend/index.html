<!DOCTYPE html>
<html>
<head>
  <title>Video Downloader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box; }
    button { background: #f48120; color: white; border: none; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Video Downloader</h2>
  <input type="text" id="url" placeholder="Video link paste karo">
  <button onclick="download()">Download Karo</button>
  <div id="output"></div>
  <script>
    async function download() {
      const url = document.getElementById('url').value;
      const output = document.getElementById('output');
      output.innerHTML = "Loading...";
      const workerUrl = 'https://video-downloader-api.TERA-NAME.workers.dev';
      const res = await fetch(`${workerUrl}?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if(data.url) {
        output.innerHTML = `<a href="${data.url}" target="_blank">Download Link</a>`;
      } else {
        output.innerHTML = "Error: " + (data.text || "Kuch galat ho gaya");
      }
    }
  </script>
</body>
</html>
