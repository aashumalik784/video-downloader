<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 Social Media Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 650px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 20px; padding: 12px; border-radius: 10px; text-align: center; }
        .loading { background: #f0f0f0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .download-btn { display: inline-block; padding: 15px 30px; background: #28a745; color: white; text-decoration: none; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Social Media Downloader</h1>
        <input type="text" id="urlInput" placeholder="Paste link here...">
        <button onclick="downloadVideo()">✨ Get Download Link</button>
        <div id="status" class="status" style="display:none;"></div>
        <div id="result"></div>
    </div>

    <script>
        const BACKEND_URL = "https://video-downloader-g5bz.onrender.com";
        
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value.trim();
            const statusDiv = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            
            if(!url) { showStatus("Please paste a link!", "error"); return; }
            showStatus("⏳ Processing...", "loading");
            
            try {
                const res = await fetch(`${BACKEND_URL}/download`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await res.json();
                
                if (data.success) {
                    showStatus("✅ Ready!", "success");
                    resultDiv.innerHTML = `<a href="${data.video_url}" target="_blank" class="download-btn">⬇️ Download Video</a>`;
                } else {
                    showStatus("❌ " + data.error, "error");
                }
            } catch (err) { showStatus("❌ Error: " + err.message, "error"); }
        }
        
        function showStatus(msg, type) {
            const s = document.getElementById("status");
            s.style.display = "block";
            s.innerText = msg;
            s.className = "status " + type;
        }
    </script>
</body>
</html>
