<!DOCTYPE html>
<html>
<body>
    <h2>Video Downloader</h2>
    <input type="text" id="urlInput" placeholder="Paste YouTube URL here">
    <button onclick="downloadVideo()">Download</button>
    <p id="status"></p>
    <a id="downloadLink" href="#" target="_blank" style="display:none;">Click here to download video</a>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const link = document.getElementById("downloadLink");

            status.innerText = "Processing...";
            
            const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();

            if (data.success) {
                status.innerText = "Done: " + data.title;
                link.href = data.download_url;
                link.style.display = "block";
            } else {
                status.innerText = "Error: " + data.error;
            }
        }
    </script>
</body>
</html>
