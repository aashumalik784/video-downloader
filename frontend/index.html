<!DOCTYPE html>
<html>
<head>
    <title>All-in-One Downloader</title>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Paste URL here...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");

            status.innerText = "Processing...";
            
            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                status.innerText = "Success!";
                resultDiv.innerHTML = `<a href="${data.video_url}" target="_blank">Download Video</a>`;
            } catch (err) {
                status.innerText = "Error: Connection failed.";
            }
        }
    </script>
</body>
</html>
