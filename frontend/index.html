<!DOCTYPE html>
<html>
<head>
    <title>Downloader</title>
</head>
<body>
    <h2>Downloader</h2>
    <input type="text" id="urlInput" placeholder="URL paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            status.innerText = "Processing...";

            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                
                // Yahan hum screen par hi pura data dikha denge taaki pata chale ki ho kya raha hai
                resultDiv.innerHTML = "<pre>API Response: " + JSON.stringify(data, null, 2) + "</pre>";
                status.innerText = "Data mil gaya!";
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
