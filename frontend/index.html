<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>All-in-One Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Video URL yahan paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            
            if(!url) { status.innerText = "Link daalo!"; return; }
            status.innerText = "Processing...";
            resultDiv.innerHTML = "";

            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                console.log("Response:", data);

                // RapidAPI ke naye structure ke hisaab se link dhoondna
                const videoLink = data.video_url || data.url || (data.result && data.result.url);

                if (videoLink) {
                    status.innerText = "Success!";
                    resultDiv.innerHTML = `<a href="${videoLink}" target="_blank" style="font-size:18px;">Click Here to Download</a>`;
                } else {
                    status.innerText = "Link nahi mila!";
                    resultDiv.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
                }
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
