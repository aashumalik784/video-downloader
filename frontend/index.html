<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Downloader</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background-color: #f4f4f4; }
        input { width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Video URL paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            
            if(!url) { status.innerText = "Link daalo!"; return; }
            status.innerText = "Processing...";
            resultDiv.innerHTML = "";

            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                
                // Cobalt API response handling
                const link = data.url || (data.picker && data.picker[0].url);

                if (link) {
                    status.innerText = "Success!";
                    resultDiv.innerHTML = `<a href="${link}" target="_blank" style="font-size:20px; color:blue;">Download Karein</a>`;
                } else {
                    status.innerText = "Link nahi mila, shayad URL galat hai.";
                }
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
