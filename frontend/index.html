<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 5px; }
        .result-link { display: block; padding: 15px; background: #28a745; color: white; margin-top: 15px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Paste link here...">
    <button onclick="downloadVideo()">Get Download Link</button>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value.trim();
            const resDiv = document.getElementById("result");
            resDiv.innerHTML = "Processing...";
            
            try {
                const response = await fetch("https://video-downloader-g5bz.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                
                // Cobalt response structure handling
                const finalLink = data.url || (data.picker && data.picker[0].url);
                
                if (finalLink) {
                    resDiv.innerHTML = `<a href="${finalLink}" target="_blank" class="result-link">⬇️ Download Now</a>`;
                } else {
                    resDiv.innerHTML = "Link nahi mila, shayad URL galat hai.";
                }
            } catch (err) {
                resDiv.innerHTML = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
