<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Downloader</title>
</head>
<body>
    <h2>Social Media Downloader</h2>
    <input type="text" id="urlInput" placeholder="Video link paste karein...">
    <button onclick="downloadVideo()">Get Video</button>
    <p id="status"></p>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");
            const resultDiv = document.getElementById("result");
            
            if(!url) { status.innerText = "Link daalo bhai!"; return; }
            status.innerText = "Processing...";

            try {
                // Cobalt API ka direct endpoint (Bina kisi alag backend ke)
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                
                if (data.status === "picker" || data.url) {
                    const link = data.url || data.picker[0].url;
                    status.innerText = "Success!";
                    resultDiv.innerHTML = `<a href="${link}" target="_blank" style="font-size:20px;">Download Video</a>`;
                } else {
                    status.innerText = "Link nahi mila, kuch aur try karein.";
                }
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
